name: Build and push sandbox-router

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Specific upstream tag to build (leave empty to check all)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push latest tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/sandbox-router
          FORCE_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "$FORCE_TAG" ]]; then
            TAG="$FORCE_TAG"
          else
            TAG=$(gh api repos/kubernetes-sigs/agent-sandbox/tags --jq '.[0].name')
          fi

          echo "Latest upstream tag: $TAG"

          if docker manifest inspect "$IMAGE:$TAG" > /dev/null 2>&1; then
            echo "$TAG already exists in GHCR, nothing to do"
            exit 0
          fi

          echo "Building $TAG..."
          git clone --depth=1 --branch "$TAG" \
            https://github.com/kubernetes-sigs/agent-sandbox upstream

          docker buildx build \
            --push \
            --tag "$IMAGE:$TAG" \
            upstream/clients/python/agentic-sandbox-client/sandbox-router

          echo "Pushed $IMAGE:$TAG"
